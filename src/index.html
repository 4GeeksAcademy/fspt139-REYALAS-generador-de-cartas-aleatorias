<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
  <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100">

    <h1 class="mb-5 title">Carta Aleatoria</h1>

    <div class="card" id="card">

      <div class="corner top-left">
        <div class="corner-value" id="val-tl"></div>
        <div class="corner-suit" id="suit-tl"></div>
      </div>

      <div class="card-body-center" id="center-pips"></div>

      <div class="corner bottom-right">
        <div class="corner-value" id="val-br"></div>
        <div class="corner-suit" id="suit-br"></div>
      </div>

    </div>

    <p class="mt-4 subtitle">Recarga la página para obtener una nueva carta</p>

  </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
</body>

</html>
